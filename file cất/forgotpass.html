<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - STEM Kỹ thuật Ô tô</title>
    <link rel="stylesheet" href="cssweb.css">
    
    <style>
        /* ==================================== */
        /* CSS cho Modal (Hộp thoại đè lên) */
        /* ==================================== */
        
        /* 1. Nền tối che mờ nội dung phía sau */
        .modal-overlay {
            display: none; /* Mặc định ẩn */
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4); /* Nền đen trong suốt */
            backdrop-filter: blur(2px); /* Hiệu ứng làm mờ nền (Tùy chọn) */
        }
        /* 2. Hộp nội dung Modal */
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto; /* Căn giữa */
            padding: 20px;
            border: 1px solid #888;
            width: 80%; 
            max-width: 400px; 
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        /* 3. Nút đóng */
        .close-btn {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            line-height: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .close-btn:hover,
        .close-btn:focus {
            color: #000;
        }
        .modal-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    
    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <p id="modalIcon" class="modal-icon"></p>
            <h3 id="modalTitle"></h3>
            <p id="modalMessage" style="font-size: 16px;"></p>
        </div>
    </div>
    
    <header>
      <div class="container">
        <h1><a href="main.html" style="color:white; text-decoration: none">STEM Kỹ thuật Ô tô</a></h1>
        <nav>
          <ul>
            <li><a href="main.html">Giới thiệu</a></li>
            <li><a href="main.html#topics">Chủ đề</a></li>
            <li><a href="main.html#projects">Dự án</a></li>
            <li><a href="main.html#contact">Liên hệ</a></li>
          </ul>
        </nav>
        <div class="auth-buttons">
          <a href="login.html" class="auth-btn">Đăng nhập</a>
          <a href="register.html" class="auth-btn">Đăng ký</a>
        </div>
      </div>
    </header>

    <section class="form-section">
      <div class="form-container">
        <h2>Quên Mật Khẩu</h2>
        <p class="form-text">
          Nhập địa chỉ email của bạn để nhận liên kết đặt lại mật khẩu.
        </p>
        
        <form id="forgotPasswordForm" action="#" method="POST"> 
          <div class="form-group">
            <label for="email">Địa chỉ Email</label>
            <input type="email" id="email" name="email" placeholder="email@domain.com" required>
          </div>
          <button type="submit">Gửi liên kết</button>
        </form>
        
        <p class="form-text">
          <a href="login.html">Quay lại Đăng nhập</a>
        </p>
      </div>
    </section>
    
    <footer>
            <p>&copy; 2025 STEM Kỹ thuật Ô tô. All rights reserved.</p>
            <p>Hotline : +8348975461</p>
            <p>Email : dacthanh0605@gmail.com</p>
    </footer>

    <script>
        const form = document.getElementById('forgotPasswordForm');
        const emailInput = document.getElementById('email');

        // Các phần tử Modal
        const modal = document.getElementById('successModal');
        const closeBtn = modal.querySelector('.close-btn');
        const modalIcon = document.getElementById('modalIcon');
        const modalTitle = document.getElementById('modalTitle');
        const modalMessage = document.getElementById('modalMessage');

        // Hàm hiển thị Modal
        function showModal(isSuccess, message) {
            if (isSuccess) {
                // Thiết lập thông báo thành công
                modalIcon.textContent = '✅';
                modalIcon.style.color = 'green';
                modalTitle.textContent = 'Gửi Liên Kết Thành Công!';
                modalMessage.innerHTML = `Đã gửi liên kết khôi phục mật khẩu vào email **${emailInput.value.trim()}**. Vui lòng kiểm tra hộp thư!`;
            } else {
                // Thiết lập thông báo lỗi
                modalIcon.textContent = '❌';
                modalIcon.style.color = 'red';
                modalTitle.textContent = 'Lỗi!';
                modalMessage.textContent = message;
            }
            modal.style.display = "block"; // Hiển thị Modal
        }

        // Hàm đóng Modal
        function closeModal() {
            modal.style.display = "none";
        }

        // Xử lý sự kiện khi nhấn nút Gửi
        form.addEventListener('submit', function(event) {
            event.preventDefault();
            
            const emailValue = emailInput.value.trim();

            if (emailValue === '') {
                // Hiện Modal lỗi nếu email trống
                showModal(false, 'Vui lòng nhập địa chỉ email của bạn.');
                return;
            }

            // Xử lý thành công (Giả lập việc gửi email)
            showModal(true, '');
            emailInput.value = ''; // Xóa email trong input
        });

        // Xử lý sự kiện đóng Modal khi nhấn nút X
        closeBtn.addEventListener('click', closeModal);

        // Xử lý sự kiện đóng Modal khi click ra ngoài hộp thoại
        window.addEventListener('click', function(event) {
            if (event.target === modal) {
                closeModal();
            }
        });
    </script>
</body>
</html>

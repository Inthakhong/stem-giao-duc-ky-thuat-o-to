<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quiz STEM Ô TÔ</title>
  <link rel="stylesheet" href="styles.css?v=1">
  <link rel="stylesheet" href="responsive.css">
</head>
<body>
  <div class="quiz-container">
    
        <div class="quiz-header" id="question"></div>

        <div class="timer">
      <div class="timer-circle" id="timer">30</div>
    </div>

        <div class="choices" id="choices"></div>

        <button class="next-btn" id="nextBtn">NEXT</button>
    
        <div class="action-buttons">
        <button class="action-btn" id="backBtn">⬅️ TRỞ VỀ TRANG CHỦ</button>
        <button class="action-btn" id="historyBtn">⏳ LỊCH SỬ QUIZ</button>
    </div>
    
        <div class="result" id="result"></div>

        <div class="history-area" id="historyArea" style="display:none;">
      <h3>Lịch sử làm Quiz</h3>
      <ul id="historyList">
              </ul>
      <button class="action-btn clear-btn" id="clearHistoryBtn">XÓA LỊCH SỬ</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
